<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Scientific Color Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <script>
      const base = '/Scientific-Color-Lab/';
      const currentPath = window.location.pathname.startsWith(base)
        ? window.location.pathname.slice(base.length - 1)
        : window.location.pathname;
      const target = `${base}#${currentPath}${window.location.search}${window.location.hash}`;
      window.location.replace(target);
    </script>
  </body>
</html>
